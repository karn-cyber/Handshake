schema_version = "1.3"
artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."
authors = [{ name = "Dynamo", email = "tasks@dynamo.example" }]
keywords = ["log-parsing", "text-processing", "json"]

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
difficulty = "easy"
expert_time_estimate_min = 18.0
junior_time_estimate_min = 40.0
difficulty_explanation = "Parse a small access log and emit summary stats."
solution_explanation = "Read the log, count requests/unique IPs, find the top path, write JSON."
verification_explanation = "Validate report.json contains the correct total_requests, unique_ips, and top_path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
network_mode = "public"
build_timeout_sec = 600.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
mcp_servers = []
